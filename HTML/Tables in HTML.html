<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML-Level 3</title>
</head>
<body>
    <table border="blaclk"> 
        <caption>Food Menu</caption>
        <!-- Table Header -->
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
            </tr>
        </thead>
        <!-- Table Body -->
        <tbody>
            <tr>
                <td>Frooti</td>
                <td>10</td>
            </tr>
            <tr>
                <td>Samosa</td>
                <td>12</td>
            </tr>
            <tr>
                <td>chips</td>
                <td>20</td>
            </tr>
        </tbody>
        <!-- Table Footer-->
        <tfoot>
            <tr>
                <th>Sum</th>
                <th>42</th>
            </tr>
        </tfoot>
    </table>

    <br>

    <table border="blaclk">
        <caption>Food Menu</caption>
        <thead>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">Price</th>
             </tr>
             <tr>
                <th>INR</th>
                <th>USD</th>
             </tr>
        </thead>
        <tbody>
            <tr>
                <td>Frooti</td>
                <td>10</td>
                <td>0.14</td>
            </tr>
            <tr>
                <td>Samosa</td>
                <td>12</td>
                <td>0.17</td>
            </tr>
            <tr>
                <td>chips</td>
                <td>20</td>
                <td>0.28</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Average</th>
                <th>42</th>
                <th>0.59</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
