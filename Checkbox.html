<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML-Level 3</title>
</head>
<body>
    <form action="/server">
        <input type="checkbox" id="age" name="age" checked />
        <label for="age"> I am 18+ </label>
        <div>
            <input type="radio" name="fruit" id="apple" value="apple" />
            <label for="apple">Apple</label>
            <input type="radio" name="fruit" id="mango" value="mango" />
            <label for="mango">Mango</label>
            <input type="radio" name="fruit" id="banana" value="banana" />
            <label for="banana">Banana</label>
            <input type="radio" name="fruit" id="grapes" value="grapes" />
            <label for="grapes">Grapes</label>
        </div>
        <br />
        <div>
            <fieldset>Choose your subjets:
                <input type="checkbox" id="math" name="subjects" value="math" />
                <label for="math"> Math </label>
                <input type="checkbox" id="science" name="subjects" value="sci" />
                <label for="science"> science </label>
                <input type="checkbox" id="English" name="subjects" value="eng"/>
                <label for="English"> English </label>
            </fieldset>
        </div>
        <div>
            Choose your profession:
            <select name="profession" id="profession">
                <option>Select your option</option>
                <option value="stu">Student</option>
                <option value="dev">Developer</option>
            </select>
        </div>
        <label for="vol">Select your volume level :</label>
        <input type="range" id="vol" min="0" max="100" name="vol" step="10">
        <br/>
        <label for="feedback">Please give your valuable feedback : </label>
        <textarea name="feedback" id="feedback" rows="5" cols="50" placeholder="Write your feedback here"></textarea>
        <button>Submit</button>
    </form>
</body>
</html>
